services:
  frontend:
    image: ghcr.io/halesyy/jackhales-testing-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./frontend
      args:
        BUILD_API_BASE_URL: ${BUILD_API_BASE_URL:-https://jackhales.jackhalestesting.xyz/api}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
      INTERNAL_API_BASE_URL: https://jackhales.jackhalestesting.xyz/api
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://jackhales.jackhalestesting.xyz}
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.middlewares.jackhales-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.jackhales-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.jackhales-frontend-web.rule=Host(`jackhales.jackhalestesting.xyz`)
      - traefik.http.routers.jackhales-frontend-web.entrypoints=web
      - traefik.http.routers.jackhales-frontend-web.middlewares=jackhales-https-redirect
      - traefik.http.routers.jackhales-frontend.rule=Host(`jackhales.jackhalestesting.xyz`)
      - traefik.http.routers.jackhales-frontend.entrypoints=websecure
      - traefik.http.routers.jackhales-frontend.tls=true
      - traefik.http.routers.jackhales-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.jackhales-frontend.loadbalancer.server.port=3000
    networks:
      - dokploy-network
    restart: unless-stopped

  backend:
    image: ghcr.io/halesyy/jackhales-testing-backend:${IMAGE_TAG:-latest}
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-jackhales}
      SESSION_SECRET: ${SESSION_SECRET}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://jackhales.jackhalestesting.xyz}
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.jackhales-backend-web.rule=Host(`jackhales.jackhalestesting.xyz`) && PathPrefix(`/api`)
      - traefik.http.routers.jackhales-backend-web.priority=100
      - traefik.http.routers.jackhales-backend-web.entrypoints=web
      - traefik.http.routers.jackhales-backend-web.middlewares=jackhales-https-redirect
      - traefik.http.routers.jackhales-backend.rule=Host(`jackhales.jackhalestesting.xyz`) && PathPrefix(`/api`)
      - traefik.http.routers.jackhales-backend.priority=100
      - traefik.http.routers.jackhales-backend.entrypoints=websecure
      - traefik.http.routers.jackhales-backend.tls=true
      - traefik.http.routers.jackhales-backend.tls.certresolver=letsencrypt
      - traefik.http.services.jackhales-backend.loadbalancer.server.port=8000
    networks:
      - dokploy-network
      - jackhales-private
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, urllib.request;
          payload = json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3));
          assert payload == {'status': 'ok', 'database': 'ok'}
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
  jackhales-private:
    external: true
